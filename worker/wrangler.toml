name = "safepush"
main = "src/index.ts"
compatibility_date = "2026-07-08"

[[kv_namespaces]]
binding = "SCANS"
id = "SAFEPUSH_SCANS_KV"
preview_id = "SAFEPUSH_SCANS_KV_PREVIEW"

[[kv_namespaces]]
binding = "SESSIONS"
id = "SAFEPUSH_SESSIONS_KV"

[env.production]
[[kv_namespaces]]
binding = "SCANS"
id = "SAFEPUSH_SCANS_KV"

[[kv_namespaces]]
binding = "SESSIONS"
id = "SAFEPUSH_SESSIONS_KV"

[vars]
DASHBOARD_TITLE = "safepush — cloud scanner"

# Set these in Cloudflare Dashboard (not here — they're secrets):
# GITHUB_CLIENT_ID     — GitHub OAuth App client ID
# GITHUB_CLIENT_SECRET — GitHub OAuth App client secret
# WEBHOOK_SECRET       — Shared secret for webhook signature verification
# BASE_URL             — Your worker URL (e.g. https://safepush.workers.dev)
